version: '3.8'

networks:
  vulcan-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  vulcan_registry:

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - vulcan-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
      grafana:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    image: vulcan-frontend:${IMAGE_TAG:-latest}
    networks:
      - vulcan-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ./api
    image: vulcan-api:${IMAGE_TAG:-latest}
    networks:
      - vulcan-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: bitnami/prometheus:latest
    user: root
    volumes:
      - ./prometheus.yml:/opt/bitnami/prometheus/conf/prometheus.yml:ro
      - prometheus_data:/opt/bitnami/prometheus/data
    networks:
      - vulcan-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - vulcan-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
