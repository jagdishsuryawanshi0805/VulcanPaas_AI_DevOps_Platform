worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;

    upstream frontend { server frontend:80; }
    upstream api { server api:5000; }
    upstream grafana { server grafana:3000; }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://frontend;
        }

        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /webhook/ {
            proxy_pass http://api/webhook/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
        }

        location /grafana/ {
            proxy_pass http://grafana/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /prometheus/ {
            proxy_pass http://prometheus:9090/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Dynamically deployed apps — auto-generated by VulcanPaaS
        # Each app gets a file: /etc/nginx/conf.d/apps/<slug>.conf
        # containing: location /apps/<slug>/ { proxy_pass http://host-gateway:<port>/; }
        include /etc/nginx/conf.d/apps/*.conf;
    }
}
